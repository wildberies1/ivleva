<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Найди жену за шаурму</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #d35400; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; overflow: hidden; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 15px; }
        .price { color: green; font-weight: bold; font-size: 1.2em; }
        .reviews-section { margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; font-size: 0.9em; }
        .review-item { background: #f9f9f9; padding: 5px; margin-bottom: 5px; border-radius: 4px; }
        button { cursor: pointer; padding: 10px; border: none; border-radius: 5px; margin-top: 5px; width: 100%; }
        .btn-book { background-color: #e67e22; color: white; }
        .btn-review { background-color: #3498db; color: white; }
        input, textarea { width: 100%; margin-bottom: 5px; padding: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <h1>🌯 Найди жену за шаурму 🌯</h1>
    <p>Лучшие кандидатуры по цене одной шаурмы!</p>
</header>

<div class="container" id="models-container">
    <!-- Карточки будут добавлены через JS -->
</div>

<script>
    // Инициализация данных, если их нет
    if (!localStorage.getItem('models')) {
        const initialModels = [
            { id: 1, name: "Анна", age: 24, price: "1 Шаурма", desc: "Любит гулять и есть мясо.", photo: "https://via.placeholder.com/300x250?text=Anna", reviews: [] },
            { id: 2, name: "Елена", age: 29, price: "2 Шаурмы", desc: "Ищет серьезного мужчину с соусом.", photo: "https://via.placeholder.com/300x250?text=Elena", reviews: [] }
        ];
        localStorage.setItem('models', JSON.stringify(initialModels));
    }

    function loadModels() {
        const container = document.getElementById('models-container');
        const models = JSON.parse(localStorage.getItem('models'));
        container.innerHTML = '';

        models.forEach(model => {
            let reviewsHtml = model.reviews.map(r => `<div class="review-item"><b>${r.user}:</b> ${r.text}</div>`).join('');

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${model.photo}" alt="${model.name}">
                <div class="card-body">
                    <h3>${model.name}, ${model.age} лет</h3>
                    <p>${model.desc}</p>
                    <p class="price">Цена: ${model.price}</p>
                    
                    <button class="btn-book" onclick="bookModel('${model.name}')">Забронировать модель</button>
                    
                    <div class="reviews-section">
                        <h4>Отзывы:</h4>
                        <div id="reviews-${model.id}">${reviewsHtml || 'Нет отзывов'}</div>
                        <input type="text" id="user-name-${model.id}" placeholder="Ваше имя">
                        <textarea id="review-text-${model.id}" placeholder="Ваш отзыв"></textarea>
                        <button class="btn-review" onclick="addReview(${model.id})">Добавить отзыв</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function bookModel(name) {
        alert(`Вы успешно забронировали встречу с ${name}! Ожидайте звонка.`);
        // Здесь можно добавить логику сохранения заказа
    }

    function addReview(id) {
        const userName = document.getElementById(`user-name-${id}`).value;
        const reviewText = document.getElementById(`review-text-${id}`).value;
        
        if (!userName || !reviewText) return alert("Заполните все поля!");

        const models = JSON.parse(localStorage.getItem('models'));
        const modelIndex = models.findIndex(m => m.id === id);
        
        if (modelIndex !== -1) {
            models[modelIndex].reviews.push({ user: userName, text: reviewText });
            localStorage.setItem('models', JSON.stringify(models));
            loadModels(); // Перезагрузить для отображения
        }
    }

    // Логирование IP (симуляция)
    fetch('https://api.ipify.org/?format=json')
        .then(res => res.json())
        .then(data => {
            const logs = JSON.parse(localStorage.getItem('visitLogs') || '[]');
            logs.push({
                ip: data.ip,
                device: navigator.userAgent,
                date: new Date().toLocaleString()
            });
            localStorage.setItem('visitLogs', JSON.stringify(logs));
        })
        .catch(() => console.log("Не удалось получить IP"));

    loadModels();
</script>

</body>
</html>
